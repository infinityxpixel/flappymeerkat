<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snappy Meerkat Deluxe</title>
    <!-- Dynamic SVG Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='35' y='20' width='30' height='50' rx='15' fill='%23fbbf24'/><circle cx='55' cy='32' r='4' fill='black'/><rect x='35' y='20' width='30' height='50' rx='15' fill='none' stroke='white' stroke-width='2'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-amber: #fbbf24;
            --neon-blue: #22d3ee;
            --bg-dark: #0a0a0c;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Space Grotesk', sans-serif;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 850px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Modern HUD */
        #hud {
            position: absolute;
            top: 2rem;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 50;
        }

        .score-display {
            font-size: 5rem;
            font-weight: 300;
            letter-spacing: -0.05em;
            opacity: 0.8;
            transition: all 0.3s ease;
        }

        /* Powerup Bar */
        #powerup-ui {
            width: 150px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            margin-top: -10px;
            overflow: hidden;
            border-radius: 10px;
            transition: opacity 0.3s ease;
        }

        #powerup-bar {
            width: 0%;
            height: 100%;
            background: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
        }

        /* Modern Glass UI */
        .glass-ui {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .glass-ui.active {
            opacity: 1;
            pointer-events: auto;
        }

        .btn-modern {
            background: white;
            color: black;
            padding: 1rem 3rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            border-radius: 0;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            cursor: pointer;
            border: 1px solid white;
        }

        .btn-modern:hover {
            background: transparent;
            color: white;
            padding: 1rem 4rem;
        }

        #flash {
            position: absolute;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 200;
        }

        /* Noise Texture Overlay */
        #game-container::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="flash"></div>
        
        <div id="hud">
            <div id="score-text" class="score-display">0</div>
            <div id="powerup-ui" class="opacity-0">
                <div id="powerup-bar"></div>
            </div>
        </div>

        <!-- Start Overlay -->
        <div id="start-overlay" class="glass-ui active">
            <h1 class="text-xs uppercase tracking-[0.5em] mb-4 opacity-50">Introducing</h1>
            <h2 class="text-4xl font-bold mb-12 tracking-tight text-center">SNAPPY MEERKAT <span class="font-light">DELUXE</span></h2>
            <button onclick="startGame()" class="btn-modern">Initiate</button>
            <p class="mt-12 text-[10px] uppercase tracking-widest opacity-30">Press Space or Tap to Fly<br>Tap the Meerkat to Magnify</p>
        </div>

        <!-- End Overlay -->
        <div id="end-overlay" class="glass-ui">
            <h2 class="text-xs uppercase tracking-[0.5em] mb-2 opacity-50">Sequence Terminated</h2>
            <div class="text-8xl font-thin mb-8" id="final-score">0</div>
            
            <div class="flex gap-12 mb-12 text-center">
                <div>
                    <p class="text-[10px] uppercase tracking-widest opacity-40 mb-1">Best</p>
                    <p class="text-xl font-bold" id="best-score">0</p>
                </div>
                <div>
                    <p class="text-[10px] uppercase tracking-widest opacity-40 mb-1">Stability</p>
                    <p class="text-xl font-bold text-cyan-400" id="stability-rank">99%</p>
                </div>
            </div>
            
            <button onclick="startGame()" class="btn-modern">Retry</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreText = document.getElementById('score-text');
        const startOverlay = document.getElementById('start-overlay');
        const endOverlay = document.getElementById('end-overlay');
        const flash = document.getElementById('flash');
        const powerupUi = document.getElementById('powerup-ui');
        const powerupBar = document.getElementById('powerup-bar');

        // Config
        let GRAVITY = 0.32;
        const JUMP = -6.8;
        let BASE_PIPE_SPEED = 3.15; 
        const BASE_PIPE_GAP = 210;
        const PIPE_WIDTH = 80;

        // State
        let gameActive = false;
        let score = 0;
        let highScore = localStorage.getItem('meerkat_deluxe_ultra_best') || 0;
        let frame = 0;
        let worldTilt = 0;
        let timeSlowdown = 1.0;
        let powerupTimer = 0;
        const POWERUP_DURATION = 300; 
        
        // Attraction State
        let isAttracting = false;
        let attractionTimer = 0;

        let meerkat = {
            x: 0, y: 0,
            vel: 0,
            rot: 0,
            w: 40, h: 50,
            trail: []
        };

        let pipes = [];
        let particles = [];
        let powerups = [];

        function init() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            meerkat.x = canvas.width * 0.25;
            meerkat.y = canvas.height * 0.5;
        }

        window.addEventListener('resize', init);
        init();

        function drawMeerkat() {
            // Draw attraction beams
            if (isAttracting) {
                ctx.save();
                ctx.translate(meerkat.x, meerkat.y);
                ctx.rotate(frame * 0.1);
                for (let i = 0; i < 8; i++) {
                    ctx.rotate(Math.PI / 4);
                    const beamLen = 60 + Math.sin(frame * 0.2) * 20;
                    const grad = ctx.createLinearGradient(0, 0, beamLen, 0);
                    grad.addColorStop(0, 'rgba(34, 211, 238, 0.8)');
                    grad.addColorStop(1, 'rgba(34, 211, 238, 0)');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, -1, beamLen, 2);
                }
                ctx.restore();
            }

            ctx.beginPath();
            ctx.strokeStyle = powerupTimer > 0 ? 'rgba(34, 211, 238, 0.4)' : 'rgba(251, 191, 36, 0.2)';
            ctx.lineWidth = 2;
            meerkat.trail.forEach((t, i) => {
                ctx.lineTo(t.x, t.y);
            });
            ctx.stroke();

            ctx.save();
            ctx.translate(meerkat.x, meerkat.y);
            ctx.rotate(meerkat.rot);

            // Body
            ctx.fillStyle = powerupTimer > 0 ? '#22d3ee' : '#fbbf24';
            if (isAttracting) ctx.fillStyle = '#fff'; // Flash white when attracting
            
            ctx.beginPath();
            ctx.roundRect(-15, -20, 30, 50, 15);
            ctx.fill();

            // Eye
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(8, -8, 4, 0, Math.PI*2);
            ctx.fill();

            ctx.shadowBlur = powerupTimer > 0 || isAttracting ? 25 : 15;
            ctx.shadowColor = powerupTimer > 0 ? '#22d3ee' : '#fbbf24';
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.lineWidth = 1;
            ctx.strokeRect(-15, -20, 30, 50);

            ctx.restore();
        }

        function drawWorld() {
            const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bg.addColorStop(0, powerupTimer > 0 ? '#05161a' : '#0a0a0c');
            bg.addColorStop(1, powerupTimer > 0 ? '#0a2a2f' : '#1a1a2e');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.shadowBlur = 50;
            ctx.shadowColor = powerupTimer > 0 ? 'rgba(34, 211, 238, 0.2)' : 'rgba(255,255,255,0.1)';
            ctx.fillStyle = 'rgba(255,255,255,0.03)';
            ctx.beginPath();
            ctx.arc(canvas.width * 0.8, 150, 100, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();

            ctx.strokeStyle = powerupTimer > 0 ? 'rgba(34, 211, 238, 0.2)' : 'rgba(34, 211, 238, 0.1)';
            ctx.lineWidth = 1;
            for(let i=0; i<5; i++) {
                let offset = (frame * (i + 1) * 0.2 * timeSlowdown) % canvas.width;
                ctx.beginPath();
                ctx.moveTo(0, canvas.height - (i * 40) - 20);
                for(let x=0; x<canvas.width; x += 20) {
                    let y = Math.sin((x + offset) * 0.01) * 20;
                    ctx.lineTo(x, canvas.height - (i * 40) - 20 + y);
                }
                ctx.stroke();
            }
        }

        function drawPipes() {
            pipes.forEach(p => {
                ctx.save();
                ctx.shadowBlur = 20;
                ctx.shadowColor = powerupTimer > 0 ? 'rgba(255,255,255,0.1)' : 'rgba(34, 211, 238, 0.3)';

                const drawObsidian = (x, y, w, h) => {
                    const g = ctx.createLinearGradient(x, y, x+w, y);
                    g.addColorStop(0, '#000');
                    g.addColorStop(0.5, '#111');
                    g.addColorStop(1, '#000');
                    ctx.fillStyle = g;
                    ctx.fillRect(x, y, w, h);
                    
                    ctx.fillStyle = powerupTimer > 0 ? 'rgba(255,255,255,0.2)' : 'rgba(34, 211, 238, 0.6)';
                    ctx.fillRect(x + w/2 - 1, y, 2, h);
                };

                drawObsidian(p.x, 0, PIPE_WIDTH, p.top);
                drawObsidian(p.x, p.top + p.gap, PIPE_WIDTH, canvas.height);
                ctx.restore();
            });
        }

        function drawPowerups() {
            powerups.forEach(pu => {
                ctx.save();
                ctx.translate(pu.x, pu.y);
                ctx.rotate(frame * 0.05);
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#22d3ee';
                
                ctx.fillStyle = '#22d3ee';
                ctx.beginPath();
                ctx.moveTo(0, -15);
                ctx.lineTo(15, 0);
                ctx.lineTo(0, 15);
                ctx.lineTo(-15, 0);
                ctx.closePath();
                ctx.fill();
                
                ctx.strokeStyle = 'rgba(255,255,255,0.8)';
                ctx.stroke();
                ctx.restore();
            });
        }

        function update() {
            if(!gameActive) return;

            frame++;
            
            if (powerupTimer > 0) {
                powerupTimer--;
                timeSlowdown = 0.7; 
                powerupBar.style.width = (powerupTimer / POWERUP_DURATION * 100) + '%';
                if (powerupTimer === 0) {
                    timeSlowdown = 1.0;
                    powerupUi.classList.add('opacity-0');
                }
            }

            if (isAttracting) {
                attractionTimer--;
                if (attractionTimer <= 0) isAttracting = false;
            }

            const dt = timeSlowdown;
            meerkat.vel += GRAVITY * dt;
            meerkat.y += meerkat.vel * dt;
            
            meerkat.rot = Math.min(Math.PI/6, Math.max(-Math.PI/10, meerkat.vel * 0.05));
            worldTilt += (meerkat.vel * 0.005 - worldTilt) * 0.1 * dt;

            meerkat.trail.push({x: meerkat.x, y: meerkat.y});
            if(meerkat.trail.length > 15) meerkat.trail.shift();

            if(meerkat.y > canvas.height || meerkat.y < -50) triggerGameOver();

            let currentPipeSpeed = (BASE_PIPE_SPEED + (score * 0.05)) * dt;

            if(frame % Math.floor(90 / dt) === 0 || pipes.length === 0) {
                const gapMultiplier = 1 + (Math.random() * 0.1 + 0.1); 
                const currentGap = BASE_PIPE_GAP * gapMultiplier;
                const t = Math.random() * (canvas.height - currentGap - 200) + 100;
                pipes.push({ x: canvas.width, top: t, gap: currentGap, passed: false });

                if (Math.random() > 0.8) {
                    powerups.push({ x: canvas.width + 200, y: Math.random() * (canvas.height - 200) + 100 });
                }
            }

            pipes.forEach((p, index) => {
                p.x -= currentPipeSpeed;
                
                const hb = 10;
                if(meerkat.x + 15 > p.x + hb && meerkat.x - 15 < p.x + PIPE_WIDTH - hb) {
                    if(meerkat.y - 15 < p.top || meerkat.y + 15 > p.top + p.gap) {
                        triggerGameOver();
                    }
                }

                if(!p.passed && p.x < meerkat.x) {
                    p.passed = true;
                    score++;
                    scoreText.innerText = score;
                }
            });

            powerups.forEach((pu, i) => {
                // Handle Attraction Physics
                if (isAttracting) {
                    const dx = meerkat.x - pu.x;
                    const dy = meerkat.y - pu.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 300) { // Magnet range
                        pu.x += (dx / dist) * 8;
                        pu.y += (dy / dist) * 8;
                    }
                }

                pu.x -= currentPipeSpeed;
                const dist = Math.hypot(meerkat.x - pu.x, meerkat.y - pu.y);
                if (dist < 40) {
                    powerupTimer = POWERUP_DURATION;
                    powerupUi.classList.remove('opacity-0');
                    powerups.splice(i, 1);
                    flash.style.opacity = '0.2';
                    setTimeout(() => flash.style.opacity = '0', 50);
                }
            });

            if(pipes.length > 0 && pipes[0].x < -100) pipes.shift();
            if(powerups.length > 0 && powerups[0].x < -100) powerups.shift();

            particles.forEach((p, i) => {
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.a -= 0.02 * dt;
                if(p.a <= 0) particles.splice(i, 1);
            });
        }

        function render() {
            ctx.save();
            ctx.translate(canvas.width/2, canvas.height/2);
            ctx.rotate(worldTilt);
            ctx.translate(-canvas.width/2, -canvas.height/2);

            drawWorld();
            drawPipes();
            drawPowerups();
            
            particles.forEach(p => {
                ctx.globalAlpha = p.a;
                ctx.fillStyle = p.c;
                ctx.fillRect(p.x, p.y, p.s, p.s);
            });
            ctx.globalAlpha = 1;

            drawMeerkat();
            ctx.restore();

            if(gameActive || startOverlay.classList.contains('active')) {
                requestAnimationFrame(render);
            }
            update();
        }

        function triggerGameOver() {
            if(!gameActive) return;
            gameActive = false;
            isAttracting = false;

            for(let i=0; i<30; i++) {
                particles.push({
                    x: meerkat.x, y: meerkat.y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    a: 1, s: Math.random() * 4 + 2,
                    c: i % 2 ? '#fbbf24' : '#22d3ee'
                });
            }

            if(score > highScore) {
                highScore = score;
                localStorage.setItem('meerkat_deluxe_ultra_best', highScore);
            }

            flash.style.opacity = '0.8';
            setTimeout(() => flash.style.opacity = '0', 100);

            document.getElementById('final-score').innerText = score;
            document.getElementById('best-score').innerText = highScore;
            document.getElementById('stability-rank').innerText = Math.max(10, 100 - score) + '%';
            
            powerupUi.classList.add('opacity-0');

            setTimeout(() => {
                endOverlay.classList.add('active');
            }, 500);
        }

        function startGame() {
            gameActive = true;
            score = 0;
            frame = 0;
            pipes = [];
            particles = [];
            powerups = [];
            powerupTimer = 0;
            timeSlowdown = 1.0;
            isAttracting = false;
            meerkat.y = canvas.height / 2;
            meerkat.vel = JUMP;
            meerkat.trail = [];
            scoreText.innerText = '0';
            
            startOverlay.classList.remove('active');
            endOverlay.classList.remove('active');
            render();
        }

        function handleInput(clientX, clientY) {
            if (!gameActive) return;

            // Check if interaction was specifically on the meerkat
            const rect = canvas.getBoundingClientRect();
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            
            const dx = x - meerkat.x;
            const dy = y - meerkat.y;
            const distance = Math.sqrt(dx*dx + dy*dy);

            if (distance < 50) {
                // Clicked/Touched Meerkat: Start attraction
                isAttracting = true;
                attractionTimer = 20; // Active for roughly 1/3 second per tap
                
                // Visual feedback particles
                for (let i = 0; i < 5; i++) {
                    particles.push({
                        x: meerkat.x, y: meerkat.y,
                        vx: (Math.random() - 0.5) * 15,
                        vy: (Math.random() - 0.5) * 15,
                        a: 1, s: 3, c: '#22d3ee'
                    });
                }
            }
            
            // Standard Jump
            jump();
        }

        function jump() {
            if(!gameActive) return;
            meerkat.vel = JUMP;
            
            for(let i=0; i<3; i++) {
                particles.push({
                    x: meerkat.x - 20, y: meerkat.y + 20,
                    vx: -2 - Math.random()*2, vy: 1 + Math.random(),
                    a: 0.5, s: 2, c: 'white'
                });
            }
        }

        window.addEventListener('keydown', (e) => { if(e.code === 'Space') jump(); });
        
        canvas.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            const touch = e.touches[0];
            handleInput(touch.clientX, touch.clientY);
        }, {passive: false});

        canvas.addEventListener('mousedown', (e) => { 
            if(e.button === 0) handleInput(e.clientX, e.clientY); 
        });

        render();
    </script>
</body>
</html>
